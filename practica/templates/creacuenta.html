{% extends "base.html" %}

{% block title %}Inicio - Mi Proyecto{% endblock %}

{% block content %}
<div class="bg-dark ">
<div class="p-5 mb-4 bg-light rounded-3">
    <input class="form-control" type="text" value="nombre de usuario" aria-label="nombre de usuario" readonly>
    <div class="mb-3 row">
    <label for="staticEmail" class="col-sm-2 col-form-label">Email</label>
    <div class="col-sm-10">
    <input type="text" readonly class="form-control-plaintext" id="staticEmail" value="email@example.com">
    </div>
</div>
<div class="mb-3 row">
    <label for="inputPassword" class="col-sm-2 col-form-label">Password</label>
<div class="col-sm-10">
    <input type="password" class="form-control" id="inputPassword">
    </div>
    <button type="button" class="btn btn-primary">Pcrea cuenta</button>

</div>
</div>
<div class="bg-dark ">
{% endblock %}
